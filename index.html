<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Meus Joguinhos</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100vh; font-family: -apple-system, "SF Pro Rounded", system-ui, sans-serif; background: linear-gradient(135deg, #fef3e2 0%, #e8f4f8 50%, #f3e5f5 100%); }
  body { padding: 40px 20px; }

  h1 { font-size: clamp(2.5rem, 7vw, 4rem); text-align: center; color: #ff7043; margin: 0 0 8px; font-weight: 900; letter-spacing: -1px; }
  .sub { text-align: center; color: #7b6f5e; font-size: 1.1rem; margin-bottom: 40px; }

  .grid {
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    max-width: 900px; margin: 0 auto;
  }
  .card {
    background: white; border-radius: 24px; padding: 30px 20px;
    text-align: center; text-decoration: none; color: inherit;
    box-shadow: 0 6px 0 rgba(0,0,0,0.06), 0 12px 24px rgba(0,0,0,0.06);
    transition: transform 0.15s, box-shadow 0.15s;
    display: block; cursor: pointer;
  }
  .card:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.06), 0 6px 12px rgba(0,0,0,0.06); }
  .card .icon { font-size: 4.5rem; line-height: 1; margin-bottom: 12px; }
  .card .title { font-size: 1.5rem; font-weight: 900; color: #ff7043; margin: 0 0 4px; }
  .card .desc { font-size: 0.95rem; color: #7b6f5e; margin: 0; }

  .card.soon { opacity: 0.55; cursor: default; }
  .card.soon .title { color: #9e9e9e; }
</style>
</head>
<body>

<h1>Meus Joguinhos</h1>
<p class="sub">Escolhe um pra começar</p>

<div class="grid">
  <a class="card" href="./games/maisum/">
    <div class="icon">🦕➕1️⃣</div>
    <div class="title">Mais Um</div>
    <p class="desc">Contar e somar +1</p>
  </a>

  <div class="card soon">
    <div class="icon">✨</div>
    <div class="title">Em breve</div>
    <p class="desc">Mais joguinhos chegando</p>
  </div>
</div>

</body>
</html>
