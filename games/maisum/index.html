<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mais Um</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, "SF Pro Rounded", system-ui, sans-serif; background: linear-gradient(135deg, #fef3e2 0%, #e8f4f8 50%, #f3e5f5 100%); }

  #start-screen, #game-screen {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }

  .back { position: absolute; top: 16px; left: 20px; font-size: 1.5rem; background: rgba(255,255,255,0.7); border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; color: inherit; }

  #start-screen h1 { font-size: clamp(3rem, 10vw, 6rem); color: #ff7043; margin: 0; font-weight: 900; letter-spacing: -2px; }
  #start-screen .hero { font-size: clamp(4rem, 12vw, 7rem); margin: 30px 0; }
  #start-btn {
    font-size: clamp(1.5rem, 4vw, 2.5rem); padding: 20px 60px; background: #66bb6a; color: white;
    border: none; border-radius: 30px; box-shadow: 0 8px 0 #4a9c4f; cursor: pointer; font-weight: 800;
  }
  #start-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #4a9c4f; }

  #game-screen { display: none; }

  .topbar {
    position: absolute; top: 16px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 1.8rem; gap: 12px;
  }
  .stars { min-height: 2rem; letter-spacing: 4px; flex: 1; text-align: center; }
  .progress { font-size: 1.2rem; font-weight: 800; color: #7b6f5e; background: rgba(255,255,255,0.7); padding: 6px 14px; border-radius: 20px; }
  .icon-btn { background: rgba(255,255,255,0.7); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 1.5rem; cursor: pointer; flex-shrink: 0; }

  .problem {
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: clamp(10px, 2vw, 30px);
    margin-bottom: clamp(20px, 4vh, 60px); min-height: 180px;
  }
  .group {
    display: flex; flex-wrap: wrap; gap: clamp(4px, 1vw, 12px); justify-content: center;
    max-width: min(40vw, 400px);
  }
  .group .item {
    font-size: clamp(2.5rem, 7vw, 5rem); animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    line-height: 1;
  }
  .plus, .equals { font-size: clamp(3rem, 7vw, 5rem); font-weight: 900; }
  .plus { color: #ff7043; }
  .equals { color: #ab47bc; }
  .numeral, .question {
    font-size: clamp(4rem, 10vw, 7rem); font-weight: 900;
    background: white; border-radius: 24px; padding: 8px clamp(20px, 4vw, 40px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.08), 0 10px 20px rgba(0,0,0,0.06);
    line-height: 1.1;
  }
  .numeral { color: #29b6f6; }
  .question { color: #ab47bc; animation: wobble 1.5s ease-in-out infinite; }

  .choices {
    display: flex; gap: clamp(12px, 2vw, 24px); flex-wrap: wrap; justify-content: center;
  }
  .choice {
    font-size: clamp(3rem, 7vw, 5rem); font-weight: 900; color: white;
    background: #29b6f6; border: none; border-radius: 28px;
    padding: clamp(20px, 3vh, 30px) clamp(40px, 6vw, 60px); min-width: clamp(120px, 15vw, 180px);
    cursor: pointer; box-shadow: 0 8px 0 #0288d1; transition: transform 0.1s, box-shadow 0.1s;
  }
  .choice:active { transform: translateY(6px); box-shadow: 0 2px 0 #0288d1; }
  .choice.correct { background: #66bb6a; box-shadow: 0 8px 0 #4a9c4f; animation: celebrate 0.6s ease; }
  .choice.wrong { background: #e0e0e0; color: #9e9e9e; box-shadow: 0 8px 0 #bdbdbd; animation: shake 0.4s; }

  @keyframes pop { from { transform: scale(0) rotate(-180deg); } to { transform: scale(1) rotate(0); } }
  @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25) rotate(-3deg); } }
  @keyframes wobble { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  .confetti { position: fixed; pointer-events: none; font-size: 2rem; animation: fall 1.2s ease-out forwards; }
  @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

  #end-screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
  #end-title { font-size: clamp(2.5rem, 7vw, 4.5rem); color: #ff7043; margin: 10px 0; font-weight: 900; }
  #end-score { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; color: #ab47bc; margin: 20px 0 30px; letter-spacing: 2px; }
  #replay-btn { font-size: clamp(1.5rem, 4vw, 2.2rem); padding: 20px 50px; background: #66bb6a; color: white; border: none; border-radius: 30px; box-shadow: 0 8px 0 #4a9c4f; cursor: pointer; font-weight: 800; }
  #replay-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #4a9c4f; }
</style>
</head>
<body>

<div id="start-screen">
  <a class="back" href="../../" aria-label="Voltar">←</a>
  <h1>Mais Um!</h1>
  <div class="hero">🦕 ➕ 1️⃣</div>
  <button id="start-btn">Começar</button>
</div>

<div id="game-screen">
  <div class="topbar">
    <a class="back" href="../../" aria-label="Voltar" style="position:static">←</a>
    <div class="stars" id="stars"></div>
    <div class="progress" id="progress"></div>
    <button class="icon-btn" id="music-toggle" aria-label="Música">🎵</button>
  </div>
  <div class="problem" id="problem"></div>
  <div class="choices" id="choices"></div>
</div>

<div id="end-screen">
  <a class="back" href="../../" aria-label="Voltar">←</a>
  <div id="end-emoji" style="font-size: clamp(6rem, 18vw, 12rem);">🎉</div>
  <h1 id="end-title"></h1>
  <div id="end-score"></div>
  <button id="replay-btn">Jogar de novo</button>
</div>

<script type="module">
import { speak, warmup } from '../../lib/tts.js';
import { ensureCtx, startMusic, stopMusic, toggleMusic, playSuccess, playWrong } from '../../lib/audio.js';
import { pick, randInt, confettiBurst } from '../../lib/ui.js';

const OBJECTS = [
  { emoji: '🦕', singular: 'dinossauro', plural: 'dinossauros', gender: 'm' },
  { emoji: '🍎', singular: 'maçã',       plural: 'maçãs',       gender: 'f' },
  { emoji: '⭐', singular: 'estrela',    plural: 'estrelas',    gender: 'f' },
  { emoji: '🐠', singular: 'peixe',      plural: 'peixes',      gender: 'm' },
  { emoji: '🌸', singular: 'flor',       plural: 'flores',      gender: 'f' },
  { emoji: '🚗', singular: 'carro',      plural: 'carros',      gender: 'm' },
  { emoji: '🐶', singular: 'cachorro',   plural: 'cachorros',   gender: 'm' },
];

function num(n, gender) {
  if (n === 1) return gender === 'f' ? 'uma' : 'um';
  if (n === 2) return gender === 'f' ? 'duas' : 'dois';
  return { 3:'três', 4:'quatro', 5:'cinco', 6:'seis', 7:'sete', 8:'oito' }[n];
}
function howMany(gender) { return gender === 'f' ? 'Quantas' : 'Quantos'; }

const QUESTIONS = [
  (g) => `${howMany(g)}?`,
  (g) => `${howMany(g)} ao todo?`,
  (g) => `${howMany(g)} no total?`,
  (g) => `Conta pra mim, ${howMany(g).toLowerCase()}?`,
  (g) => `Me diz, ${howMany(g).toLowerCase()}?`,
  (g) => `${howMany(g)} ficaram?`,
];
const SUCCESS = [
  (w) => `Isso! ${w}!`,
  (w) => `Muito bem! ${w}!`,
  (w) => `Boa! São ${w}!`,
  (w) => `Acertou! ${w}!`,
  (w) => `Isso mesmo! ${w}!`,
  (w) => `Mandou bem! ${w}!`,
];
const WRONG = [
  'Tenta de novo!',
  'Quase! Tenta outra.',
  'Hmm, não foi dessa.',
  'Olha de novo!',
  'Conta com calma!',
  'Tenta mais uma vez.',
];

const TOTAL_ROUNDS = 10;
let score = 0;
let round = 0;
let answered = false;
let firstTry = true;
let currentGender = 'm';

function renderGroup(n, obj) {
  let html = '<div class="group">';
  for (let i = 0; i < n; i++) html += `<span class="item">${obj}</span>`;
  html += '</div>';
  return html;
}

function nextProblem() {
  if (round >= TOTAL_ROUNDS) { endGame(); return; }
  round++;
  answered = false;
  firstTry = true;
  document.getElementById('progress').textContent = `${round}/${TOTAL_ROUNDS}`;

  const n = randInt(1, 5);
  const answer = n + 1;
  const obj = pick(OBJECTS);
  const g = obj.gender;
  currentGender = g;
  const word = (k) => num(k, g);
  const noun = (k) => k === 1 ? obj.singular : obj.plural;

  const mode = round % 3;
  let problemHTML, prompt;

  if (mode === 1) {
    // objetos + objetos
    problemHTML =
      renderGroup(n, obj.emoji) + '<span class="plus">+</span>' +
      renderGroup(1, obj.emoji) + '<span class="equals">=</span><span class="question">?</span>';
    prompt = `${word(n)} ${noun(n)} mais ${word(1)}. ${pick(QUESTIONS)(g)}`;
  } else if (mode === 2) {
    // objetos + algarismo "1"
    problemHTML =
      renderGroup(n, obj.emoji) + '<span class="plus">+</span><span class="numeral">1</span>' +
      '<span class="equals">=</span><span class="question">?</span>';
    prompt = `${word(n)} ${noun(n)} mais ${word(1)}. ${pick(QUESTIONS)(g)}`;
  } else {
    // algarismo N + 1 objeto
    problemHTML =
      `<span class="numeral">${n}</span><span class="plus">+</span>` +
      renderGroup(1, obj.emoji) + '<span class="equals">=</span><span class="question">?</span>';
    prompt = `${word(n)} mais ${word(1)} ${noun(1)}. ${pick(QUESTIONS)(g)}`;
  }

  document.getElementById('problem').innerHTML = problemHTML;

  // escolhas: correta + 2 distratores próximos
  const choices = new Set([answer]);
  while (choices.size < 3) {
    const offset = pick([-2, -1, 1, 2]);
    const d = answer + offset;
    if (d >= 1 && d <= 9 && d !== answer) choices.add(d);
  }
  const shuffled = [...choices].sort(() => Math.random() - 0.5);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  shuffled.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c;
    btn.onclick = () => pickAnswer(c, answer, btn);
    choicesEl.appendChild(btn);
  });

  setTimeout(() => speak(prompt), 350);
}

function pickAnswer(picked, correct, btn) {
  if (answered) return;
  if (picked === correct) {
    answered = true;
    btn.classList.add('correct');
    playSuccess();
    confettiBurst();
    if (firstTry) { score++; updateStars(); }
    setTimeout(() => speak(pick(SUCCESS)(num(correct, currentGender))), 100);
    setTimeout(nextProblem, 2400);
  } else {
    firstTry = false;
    btn.classList.add('wrong');
    btn.disabled = true;
    playWrong();
    setTimeout(() => speak(pick(WRONG)), 100);
  }
}

function updateStars() {
  document.getElementById('stars').textContent = '⭐'.repeat(Math.min(score, 10));
}

function endGame() {
  document.getElementById('game-screen').style.display = 'none';
  const end = document.getElementById('end-screen');
  end.style.display = 'flex';

  let emoji, title, phrase;
  if (score === TOTAL_ROUNDS) { emoji = '🏆'; title = 'Perfeito!'; phrase = 'Gabaritou! Mandou muito bem!'; }
  else if (score >= 7)        { emoji = '🌟'; title = 'Muito bem!'; phrase = 'Que show de bola!'; }
  else if (score >= 4)        { emoji = '🎉'; title = 'Boa!';       phrase = 'Continua assim!'; }
  else                        { emoji = '💪'; title = 'Vamos de novo!'; phrase = 'Cada vez melhor!'; }

  document.getElementById('end-emoji').textContent = emoji;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-score').innerHTML = `${'⭐'.repeat(score)}${'☆'.repeat(TOTAL_ROUNDS - score)}<br>${score} de ${TOTAL_ROUNDS}`;

  if (score >= 7) { confettiBurst(); setTimeout(confettiBurst, 400); setTimeout(confettiBurst, 800); }
  setTimeout(() => speak(`${title} ${phrase} Você acertou ${score} de ${TOTAL_ROUNDS}.`), 300);
}

function resetGame() {
  score = 0; round = 0; firstTry = true; answered = false;
  updateStars();
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  nextProblem();
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  ensureCtx();
  warmup();
  startMusic();
  nextProblem();
});

document.getElementById('music-toggle').addEventListener('click', () => {
  const on = toggleMusic();
  document.getElementById('music-toggle').textContent = on ? '🎵' : '🔇';
});

document.getElementById('replay-btn').addEventListener('click', resetGame);
</script>

</body>
</html>
